# File: .github/workflows/train_ci.yml
name: MLflow CI Automation and Docker Build Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'Workflow-CI/**' # Berjalan otomatis jika ada perubahan di folder Workflow-CI
  workflow_dispatch: # Mengizinkan trigger manual lewat tombol klik di GitHub

permissions:
  contents: write

jobs:
  mlflow-ci-job:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v4

    - name: 2. Setup Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Install Requirements
      run: |
        python -m pip install --upgrade pip
        pip install mlflow dagshub pandas numpy scikit-learn matplotlib seaborn

    - name: 4. Run MLflow Project (Re-training Model)
      env:
        DAGSHUB_CLIENT_TOKEN: ${{ secrets.DAGSHUB_TOKEN }} # Memanggil token DagsHub dari GitHub Secrets
      run: |
        cd Workflow-CI/MLProject
        # Memaksa tracking disimpan secara lokal di server agar folder mlruns terbentuk
        export MLFLOW_TRACKING_URI=mlruns
        mlflow run . --no-conda

    - name: 5. Build Docker Image via MLflow Build-Docker (ADVANCE Syarat)
      run: |
        # Mencari subfolder 'ci_trained_model' secara dinamis di dalam folder mlruns lokal
        MODEL_PATH=$(find Workflow-CI/MLProject/mlruns/ -type d -name "ci_trained_model" | head -n 1)
        
        # Pengaman jika skrip hanya me-log online dan folder lokal tidak terdeteksi
        if [ -z "$MODEL_PATH" ]; then
          echo "[!] Folder mlruns lokal kosong atau tidak ditemukan. Menggunakan fallback root MLProject..."
          MODEL_PATH="Workflow-CI/MLProject"
        fi
        
        echo "[+] Mengompilasi Docker Image menggunakan path model: $MODEL_PATH"
        mlflow models build-docker -m "$MODEL_PATH" -n "agungprayuda/student-performance-model:latest" --enable-mlserver

    - name: 6. Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }} # Memanggil username Docker Hub dari GitHub Secrets
        password: ${{ secrets.DOCKERHUB_TOKEN }}    # Memanggil Access Token Docker Hub dari GitHub Secrets

    - name: 7. Push Docker Image to Docker Hub Repo
      run: |
        docker push agungprayuda/student-performance-model:latest

    - name: 8. Save Artifact Back to Same GitHub Repository (SKILLED Syarat)
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: automated ci pipeline artifact upload [skip ci]"
        file_pattern: 'Workflow-CI/MLProject/mlruns/**'
