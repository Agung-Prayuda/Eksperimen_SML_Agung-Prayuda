# File: .github/workflows/train_ci.yml
name: MLflow CI Automation and Docker Build Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'Workflow-CI/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mlflow-ci-job:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v4

    - name: 2. Setup Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Install Requirements
      run: |
        python -m pip install --upgrade pip
        pip install mlflow dagshub pandas numpy scikit-learn matplotlib seaborn

    - name: 4. Run MLflow Project (Re-training Model)
      env:
        DAGSHUB_CLIENT_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      run: |
        cd Workflow-CI/MLProject
        mlflow run . --no-conda

    - name: 5. Build Docker Image via MLflow Build-Docker (ADVANCE Syarat)
      run: |
        # Membaca hasil tracking lokal yang baru saja selesai dijalankan di langkah 4
        # MLflow secara otomatis membuat folder run id unik di dalam direktori mlruns/0/<run_id>/artifacts/ci_trained_model
        # Kita gunakan pencarian wildcard agar docker build menemukan file 'MLmodel' dengan tepat
        MODEL_PATH=$(find Workflow-CI/MLProject/mlruns/0/ -type d -name "ci_trained_model" | head -n 1)
        
        if [ -z "$MODEL_PATH" ]; then
          echo "Error: Folder model ci_trained_model tidak ditemukan!"
          exit 1
        fi
        
        echo "Menemukan model di direktori: $MODEL_PATH"
        mlflow models build-docker -m "$MODEL_PATH" -n "agungprayuda/student-performance-model:latest" --enable-mlserver

    - name: 6. Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: 7. Push Docker Image to Docker Hub Repo
      run: |
        docker push agungprayuda/student-performance-model:latest

    - name: 8. Save Artifact Back to Same GitHub Repository (SKILLED Syarat)
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: automated ci pipeline artifact upload [skip ci]"
        file_pattern: 'Workflow-CI/MLProject/mlruns/**'
