# File: .github/workflows/train_ci.yml
name: MLflow CI Automation and Docker Build Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'Workflow-CI/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mlflow-ci-job:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v4

    - name: 2. Setup Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Install Requirements
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.14.1 dagshub pandas numpy scikit-learn matplotlib seaborn

    - name: 4. Run MLflow Project (Re-training Model)
      env:
        DAGSHUB_CLIENT_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        MLFLOW_ALLOW_FILE_STORE: true
        MLFLOW_TRACKING_URI: "mlruns"
      run: |
        cd Workflow-CI/MLProject
        python modelling.py

    - name: 5. Build Docker Image via MLflow Build-Docker (ADVANCE Syarat)
      env:
        MLFLOW_ALLOW_FILE_STORE: true
      run: |
        echo "[+] Mencari berkas cetak biru 'MLmodel' di seluruh direktori..."
        # Mencari berkas MLmodel fisik di seluruh runner workspace
        MLMODEL_FILE=$(find . -type f -name "MLmodel" | head -n 1)
        
        if [ -z "$MLMODEL_FILE" ]; then
          echo "[!] MLmodel utama tersembunyi. Mengunci jalur cadangan fisik terjamin..."
          # Mengarahkan otomatis ke lokasi save_model lokal yang telah kita amankan
          TARGET_MODEL_PATH=$(find . -type d -name "ci_trained_model_backup" | head -n 1)
        else
          TARGET_MODEL_PATH=$(dirname "$MLMODEL_FILE")
        fi
        
        # Skenario pengaman darurat akhir jika semua find diblokir oleh sistem hak akses linux
        if [ -z "$TARGET_MODEL_PATH" ] || [ ! -d "$TARGET_MODEL_PATH" ]; then
          echo "[*] Menggunakan fallback direktori statis lokal..."
          TARGET_MODEL_PATH="Workflow-CI/MLProject/ci_trained_model_backup"
        fi
        
        echo "[+] Folder model sukses dikunci di: $TARGET_MODEL_PATH"
        echo "[+] Mengompilasi Docker Image..."
        mlflow models build-docker -m "$TARGET_MODEL_PATH" -n "agungprayuda/student-performance-model:latest"

    - name: 6. Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: 7. Push Docker Image to Docker Hub Repo
      run: |
        docker push agungprayuda/student-performance-model:latest

    - name: 8. Save Artifact Back to Same GitHub Repository (SKILLED Syarat)
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: automated ci pipeline artifact upload [skip ci]"
        file_pattern: '**/mlruns/**'
